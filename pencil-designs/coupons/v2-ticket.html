<!-- @dsCard group="쿠폰함" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1">
<title>V2 · 티켓형</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; display: flex; justify-content: center; }
  .phone { width: 430px; min-height: 932px; background: #f5f5f5; }
  .header { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); height: 64px; display: flex; align-items: center; padding: 0 24px; z-index: 10; }
  .header h1 { position: absolute; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: 500; color: #000; }
  .count { font-size: 14px; color: #aaa; padding: 16px 24px 12px; }
  .list { padding: 0 24px 40px; display: flex; flex-direction: column; gap: 12px; }
  .ticket { display: flex; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .ticket.expired { opacity: 0.4; }
  /* 왼쪽 할인 컬럼 */
  .ticket-left { width: 100px; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 8px; flex-shrink: 0; position: relative; }
  .ticket-left::after { content: ''; position: absolute; right: -8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background: #f5f5f5; }
  .ticket.expired .ticket-left { background: #ccc; }
  .discount-val { font-family: 'SF Mono', monospace; font-size: 22px; font-weight: 800; color: #fff; text-align: center; line-height: 1.1; }
  .discount-unit { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  /* 오른쪽 정보 */
  .ticket-right { background: #fff; flex: 1; padding: 16px 16px 16px 24px; border-left: 1px dashed #e0e0e0; position: relative; }
  .t-name { font-size: 14px; font-weight: 600; color: #000; margin-bottom: 4px; }
  .t-min { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .t-expiry { font-size: 11px; color: #bbb; }
  .t-badge { position: absolute; top: 14px; right: 14px; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #000; color: #fff; }
  .t-badge.expired { background: #e0e0e0; color: #aaa; }
  .label { font-size: 11px; color: #bbb; letter-spacing: .08em; text-transform: uppercase; padding: 16px 24px 0; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h1>쿠폰함</h1>
  </div>
  <p class="label">V2 · 티켓형</p>
  <p class="count">사용 가능 3장</p>
  <div class="list">
    <div class="ticket">
      <div class="ticket-left"><div class="discount-val">3,000<br>원</div></div>
      <div class="ticket-right">
        <span class="t-badge">사용가능</span>
        <div class="t-name">신규 가입 축하 쿠폰</div>
        <div class="t-min">20,000원 이상 구매 시</div>
        <div class="t-expiry">~ 2026-06-30</div>
      </div>
    </div>
    <div class="ticket">
      <div class="ticket-left"><div class="discount-val">10<br>%</div></div>
      <div class="ticket-right">
        <span class="t-badge">사용가능</span>
        <div class="t-name">비타민 카테고리 할인</div>
        <div class="t-min">30,000원 이상 구매 시</div>
        <div class="t-expiry">~ 2026-07-15</div>
      </div>
    </div>
    <div class="ticket">
      <div class="ticket-left"><div class="discount-val">2,000<br>원</div></div>
      <div class="ticket-right">
        <span class="t-badge">사용가능</span>
        <div class="t-name">재구매 감사 쿠폰</div>
        <div class="t-min">10,000원 이상 구매 시</div>
        <div class="t-expiry">~ 2026-07-31</div>
      </div>
    </div>
    <div class="ticket expired">
      <div class="ticket-left"><div class="discount-val">5,000<br>원</div></div>
      <div class="ticket-right">
        <span class="t-badge expired">만료</span>
        <div class="t-name">5월 봄맞이 쿠폰</div>
        <div class="t-min">50,000원 이상 구매 시</div>
        <div class="t-expiry">~ 2026-05-31</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
