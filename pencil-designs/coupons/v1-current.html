<!-- @dsCard group="쿠폰함" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1">
<title>V1 · 현재 디자인 (카드형)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; display: flex; justify-content: center; }
  .phone { width: 430px; min-height: 932px; background: #fff; position: relative; }
  .header { position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); height: 64px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid #f0f0f0; z-index: 10; }
  .header svg { color: #888; }
  .header h1 { position: absolute; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: 500; color: #000; }
  .count { font-size: 14px; color: #aaa; padding: 16px 24px 12px; }
  .list { padding: 0 24px 40px; display: flex; flex-direction: column; gap: 12px; }
  .card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; background: #fff; }
  .card.expired { opacity: 0.45; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .discount { font-family: 'SF Mono', monospace; font-size: 24px; font-weight: 700; color: #000; }
  .name { font-size: 15px; color: #000; margin-top: 4px; }
  .min-order { font-size: 13px; color: #aaa; margin-top: 4px; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
  .badge-active { background: #000; color: #fff; }
  .badge-expired { background: #f5f5f5; color: #aaa; }
  .expiry { font-size: 12px; color: #bbb; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0; }
  .label { font-size: 11px; color: #bbb; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h1>쿠폰함</h1>
  </div>
  <p class="label" style="padding:16px 24px 0">V1 · 현재 디자인 (카드형)</p>
  <p class="count">사용 가능 3장</p>
  <div class="list">
    <div class="card">
      <div class="card-top">
        <div><div class="discount">3,000원</div><div class="name">신규 가입 축하 쿠폰</div><div class="min-order">20,000원 이상</div></div>
        <span class="badge badge-active">사용가능</span>
      </div>
      <div class="expiry">2026-06-30까지</div>
    </div>
    <div class="card">
      <div class="card-top">
        <div><div class="discount">10%</div><div class="name">비타민 카테고리 할인</div><div class="min-order">30,000원 이상</div></div>
        <span class="badge badge-active">사용가능</span>
      </div>
      <div class="expiry">2026-07-15까지</div>
    </div>
    <div class="card">
      <div class="card-top">
        <div><div class="discount">2,000원</div><div class="name">재구매 감사 쿠폰</div><div class="min-order">10,000원 이상</div></div>
        <span class="badge badge-active">사용가능</span>
      </div>
      <div class="expiry">2026-07-31까지</div>
    </div>
    <div class="card expired">
      <div class="card-top">
        <div><div class="discount">5,000원</div><div class="name">5월 봄맞이 쿠폰</div><div class="min-order">50,000원 이상</div></div>
        <span class="badge badge-expired">만료</span>
      </div>
      <div class="expiry">2026-05-31까지</div>
    </div>
  </div>
</div>
</body>
</html>
